<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>República — um jogo de cultivo paciente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════════════════════
     REPÚBLICA · v0.1
     Um jogo idle inspirado em Adventure Communist
     Fundindo Lumen (editorial) + Jardim (botânico) + Corrente (modernista)
     ═══════════════════════════════════════════════════════════ */

  :root {
    /* Paleta base — pergaminho Lumen */
    --paper:        #f0e8d3;
    --paper-2:      #e8dfc4;
    --paper-3:      #ded2b0;
    --vellum:       #faf4e2;

    --ink:          #2a2317;
    --ink-soft:     #4a3f2a;
    --ink-faded:    #7a6b4d;

    /* Acentos das 3 identidades */
    --moss:         #556b2f;   /* Jardim · sementes */
    --moss-deep:    #3a4a20;
    --pool:         #1e5fb3;   /* Corrente · braçadas */
    --pool-deep:    #164690;
    --pool-light:   #9cc4ed;
    --terracotta:   #b85842;   /* Lumen · letras */
    --terracotta-d: #8a3f2e;

    --gold:         #b8954a;
    --bordeaux:     #722d2d;

    --line:         #2a2317;
    --line-soft:    #8a7a5d;
    --line-dashed:  rgba(138, 122, 93, 0.5);

    --font-display: 'Fraunces', Georgia, serif;
    --font-body:    'Lora', Georgia, serif;
    --font-mono:    'JetBrains Mono', monospace;

    /* Texturas e sombras específicas por tema */
    --noise-opacity: 0.07;
    --noise-blend: multiply;
    --card-shadow: none;
  }

  /* ── NOITE — caderno à luz de vela, couro velho ── */
  [data-theme="dark"] {
    /* Fundo: couro escuro, cor de café-livraria */
    --paper:        #1a1510;
    --paper-2:      #221c16;
    --paper-3:      #2b241c;
    --vellum:       #251e17;   /* cartão levemente elevado */

    /* Tinta-creme (inverso do modo claro) */
    --ink:          #ede3c8;
    --ink-soft:     #c9bc9a;
    --ink-faded:    #8a7a5d;

    /* Acentos luminosos — brasa, vivo, lua */
    --moss:         #9bb56a;       /* musgo iluminado */
    --moss-deep:    #b8cf85;       /* mais claro ainda pra valores */
    --pool:         #6ba5e0;       /* azul-lua */
    --pool-deep:    #8fc0ee;       /* azul claro pra valores */
    --pool-light:   #3d5f88;       /* azul mais fundo pra backgrounds */
    --terracotta:   #e08872;       /* brasa acesa */
    --terracotta-d: #f0a590;       /* brasa mais viva pra valores */

    --gold:         #d4b168;       /* dourado mais quente */
    --bordeaux:     #c4584f;       /* vermelho vivo */

    --line:         #8a7a5d;       /* linha dourada-terrosa */
    --line-soft:    #5a4f3a;
    --line-dashed:  rgba(138, 122, 93, 0.4);

    --noise-opacity: 0.05;
    --noise-blend: screen;
    --card-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--paper);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1), color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Textura de papel */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    opacity: var(--noise-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' seed='5'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: var(--noise-blend);
    transition: opacity 0.6s;
  }

  /* ═══════════════ LAYOUT ═══════════════ */

  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 20px;
    min-height: 100vh;
  }

  /* ═══════════════ HEADER ═══════════════ */

  header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 24px;
    align-items: end;
    padding-bottom: 16px;
    border-bottom: 2px double var(--line);
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .brand-name {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 400;
    font-style: italic;
    line-height: 1;
    letter-spacing: -0.02em;
    font-variation-settings: "SOFT" 60;
  }
  .brand-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faded);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .header-center {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-faded);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .header-center strong {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 20px;
    color: var(--ink);
    display: block;
    letter-spacing: 0;
    text-transform: none;
    font-weight: 500;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    font-family: var(--font-body);
    font-style: italic;
    font-size: 14px;
    padding: 6px 14px;
    background: var(--vellum);
    color: var(--ink);
    border: 1px solid var(--line);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--ink); color: var(--vellum); }
  .btn.reset { font-size: 12px; padding: 4px 10px; }

  /* Theme toggle — sol/lua que gira */
  .theme-toggle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--vellum);
    cursor: pointer;
    position: relative;
    padding: 0;
    overflow: hidden;
    transition: all 0.3s;
    color: var(--ink);
    flex-shrink: 0;
  }
  .theme-toggle:hover {
    background: var(--ink);
    color: var(--vellum);
  }
  .theme-toggle svg {
    position: absolute;
    top: 50%;
    left: 50%;
    transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s;
  }
  /* Sol visível no claro, Lua escondida */
  .theme-toggle .theme-icon-sun {
    transform: translate(-50%, -50%) rotate(0deg);
    opacity: 1;
  }
  .theme-toggle .theme-icon-moon {
    transform: translate(-50%, -50%) rotate(180deg) scale(0.4);
    opacity: 0;
  }
  /* No dark, inverte */
  [data-theme="dark"] .theme-toggle .theme-icon-sun {
    transform: translate(-50%, -50%) rotate(180deg) scale(0.4);
    opacity: 0;
  }
  [data-theme="dark"] .theme-toggle .theme-icon-moon {
    transform: translate(-50%, -50%) rotate(0deg) scale(1);
    opacity: 1;
  }

  /* ═══════════════ RESOURCES BAR ═══════════════ */

  .resources {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 16px;
    background: var(--vellum);
    border: 1px solid var(--line);
    position: relative;
  }
  .resources::before {
    content: "";
    position: absolute;
    inset: 5px;
    border: 1px dashed var(--line-dashed);
    pointer-events: none;
  }

  .resource {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 14px;
    align-items: center;
    padding: 0 10px;
    border-right: 1px dashed var(--line-soft);
  }
  .resource:last-child { border-right: none; }

  .resource-icon {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

  .resource-text .label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faded);
  }
  .resource-text .value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .resource-text .rate {
    font-family: var(--font-body);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-faded);
  }
  .resource-text .rate strong {
    font-family: var(--font-mono);
    font-style: normal;
    font-weight: 500;
  }

  .resource.letters .resource-text .value { color: var(--terracotta-d); }
  .resource.seeds .resource-text .value { color: var(--moss-deep); }
  .resource.strokes .resource-text .value { color: var(--pool-deep); }

  /* ═══════════════ MAIN BOARD — 3 COLUMNS ═══════════════ */

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .track {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .track-head {
    padding: 14px 16px;
    border: 1px solid var(--line);
    background: var(--vellum);
    position: relative;
  }
  .track-head::before {
    content: "";
    position: absolute;
    inset: 4px;
    border: 1px solid var(--line-dashed);
    pointer-events: none;
  }

  .track-head .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faded);
    margin-bottom: 4px;
  }
  .track-head h2 {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 400;
    font-style: italic;
    line-height: 1;
    letter-spacing: -0.02em;
    font-variation-settings: "SOFT" 80;
  }
  .track-head .motto {
    font-family: var(--font-body);
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 8px;
  }

  .track.letters .track-head h2 { color: var(--terracotta-d); }
  .track.seeds .track-head h2 { color: var(--moss-deep); }
  .track.strokes .track-head h2 { color: var(--pool-deep); }

  /* ═══════════════ GENERATOR CARD ═══════════════ */

  .gen {
    background: var(--vellum);
    border: 1px solid var(--line);
    padding: 14px;
    position: relative;
    transition: opacity 0.3s, background 0.6s, border-color 0.6s, box-shadow 0.6s;
    box-shadow: var(--card-shadow);
  }

  .gen.locked {
    opacity: 0.4;
    pointer-events: none;
  }
  .gen.locked .gen-locked-overlay {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faded);
    background: rgba(250, 244, 226, 0.7);
    pointer-events: auto;
  }

  .gen-top {
    display: grid;
    grid-template-columns: 40px 1fr auto;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
  }

  .gen-icon {
    width: 40px; height: 40px;
    display: grid;
    place-items: center;
    border: 1px solid var(--line-soft);
    background: var(--paper);
  }

  .gen-name {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .gen-name em {
    font-style: italic;
    font-variation-settings: "SOFT" 80;
  }
  .gen-species {
    font-family: var(--font-body);
    font-style: italic;
    font-size: 11px;
    color: var(--ink-faded);
    margin-top: 2px;
  }

  .gen-count {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
    text-align: right;
  }
  .gen-count-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--ink-faded);
    text-transform: uppercase;
    text-align: right;
    margin-top: 2px;
  }

  .gen-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 8px 0;
    border-top: 1px dashed var(--line-dashed);
    border-bottom: 1px dashed var(--line-dashed);
    margin-bottom: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .gen-stats .stat-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--ink-faded);
    text-transform: uppercase;
  }
  .gen-stats .stat-value {
    color: var(--ink);
    font-weight: 500;
  }

  /* Botão de compra */
  .buy-btn {
    width: 100%;
    padding: 10px 12px;
    background: var(--ink);
    color: var(--vellum);
    border: 1px solid var(--ink);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    transition: all 0.2s;
  }
  .buy-btn:hover:not(:disabled) {
    background: var(--terracotta);
    border-color: var(--terracotta);
  }
  .buy-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    background: var(--ink-faded);
    border-color: var(--ink-faded);
  }

  .track.letters .buy-btn:hover:not(:disabled) { background: var(--terracotta); border-color: var(--terracotta); }
  .track.seeds .buy-btn:hover:not(:disabled) { background: var(--moss); border-color: var(--moss); }
  .track.strokes .buy-btn:hover:not(:disabled) { background: var(--pool); border-color: var(--pool); }

  .buy-btn .buy-action {
    font-style: italic;
    letter-spacing: 0.01em;
    text-align: left;
  }
  .buy-btn .buy-cost {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
  }

  /* Tier indicator na lateral */
  .gen[data-tier="1"] { border-left: 3px solid var(--line); }
  .gen[data-tier="2"] { border-left: 3px solid var(--line-soft); }
  .gen[data-tier="3"] { border-left: 3px solid var(--gold); }
  .gen[data-tier="4"] { border-left: 3px solid var(--bordeaux); }

  /* Pulse quando gera */
  @keyframes pulseGen {
    0% { box-shadow: 0 0 0 0 rgba(184, 88, 66, 0.4); }
    100% { box-shadow: 0 0 0 8px rgba(184, 88, 66, 0); }
  }
  .gen.pulse { animation: pulseGen 0.6s ease-out; }

  /* ═══════════════ LOG / FOOTER ═══════════════ */

  .log-wrap {
    padding: 12px 16px;
    background: var(--vellum);
    border: 1px solid var(--line);
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .log-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faded);
    padding-right: 12px;
    border-right: 1px solid var(--line-soft);
  }

  .log-feed {
    display: flex;
    gap: 24px;
    overflow: hidden;
    color: var(--ink-soft);
  }
  .log-item {
    white-space: nowrap;
    opacity: 0;
    animation: fadeIn 0.4s ease-out forwards;
  }
  .log-item .acc { color: var(--terracotta); font-weight: 500; }
  .log-item .acc.moss { color: var(--moss-deep); }
  .log-item .acc.pool { color: var(--pool-deep); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-total {
    color: var(--ink-faded);
  }
  .log-total strong { color: var(--ink); font-weight: 500; }

  /* ═══════════════ MILESTONES ═══════════════ */

  .milestone-toast {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--ink);
    color: var(--vellum);
    padding: 14px 24px;
    border: 1px solid var(--gold);
    font-family: var(--font-display);
    font-style: italic;
    font-size: 18px;
    letter-spacing: -0.01em;
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s;
    opacity: 0;
    z-index: 200;
    pointer-events: none;
    box-shadow: 4px 4px 0 var(--line-soft);
  }
  .milestone-toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .milestone-toast::before {
    content: "✦ ";
    color: var(--gold);
  }

  /* FPS counter — discreto no canto superior direito */
  .fps-counter {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 150;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: lowercase;
    color: var(--ink-faded);
    background: var(--vellum);
    border: 1px solid var(--line-soft);
    padding: 4px 9px;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
    user-select: none;
    transition: background 0.6s, color 0.6s, border-color 0.6s;
  }
  .fps-counter::before {
    content: "▢ ";
    color: var(--moss);
    margin-right: 2px;
  }

  /* Responsive */
  @media (max-width: 960px) {
    header { grid-template-columns: 1fr; gap: 12px; }
    .resources { grid-template-columns: 1fr; gap: 12px; }
    .resource { border-right: none; border-bottom: 1px dashed var(--line-soft); padding-bottom: 10px;}
    .resource:last-child { border-bottom: none; }
    .board { grid-template-columns: 1fr; }
    .log-wrap { grid-template-columns: 1fr; }
    .log-feed { overflow-x: auto; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ═══════════ HEADER ═══════════ -->
  <header>
    <div class="brand">
      <div class="brand-name">República</div>
      <div class="brand-sub">v0.1 · MMXXVI</div>
    </div>
    <div class="header-center">
      <strong id="era">Primeira era — Fundação</strong>
      Um jogo de cultivo paciente
    </div>
    <div class="header-actions">
      <button class="theme-toggle" id="themeBtn" aria-label="Alternar tema">
        <svg class="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <circle cx="12" cy="12" r="4" fill="currentColor"/>
          <line x1="12" y1="2" x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="5" y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="5" y1="5" x2="7" y2="7"/>
          <line x1="17" y1="17" x2="19" y2="19"/>
          <line x1="5" y1="19" x2="7" y2="17"/>
          <line x1="17" y1="7" x2="19" y2="5"/>
        </svg>
        <svg class="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor" fill-opacity="0.3"/>
        </svg>
      </button>
      <button class="btn" id="saveBtn">Anotar no diário</button>
      <button class="btn reset" id="resetBtn">Reiniciar</button>
    </div>
  </header>

  <!-- ═══════════ RESOURCES ═══════════ -->
  <div class="resources">
    <div class="resource letters">
      <div class="resource-icon">
        <!-- pena -->
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="var(--terracotta-d)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 30 L 28 8"/>
          <path d="M14 8 Q 24 8 28 18 L 20 18 Q 14 18 10 14 Z" fill="var(--terracotta)" fill-opacity="0.2"/>
          <path d="M14 12 L 24 12 M 14 16 L 22 16"/>
          <circle cx="6" cy="30" r="1.5" fill="var(--terracotta-d)"/>
        </svg>
      </div>
      <div class="resource-text">
        <div class="label">Letras</div>
        <div class="value" id="val-letters">0</div>
        <div class="rate"><strong id="rate-letters">0</strong>/s · escritas</div>
      </div>
    </div>

    <div class="resource seeds">
      <div class="resource-icon">
        <!-- semente germinando -->
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="var(--moss-deep)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="18" cy="24" rx="7" ry="4" fill="var(--moss)" fill-opacity="0.25"/>
          <ellipse cx="18" cy="24" rx="7" ry="4"/>
          <path d="M18 22 Q 18 14 18 8"/>

  // ═══════════════════════════════════════════════════════════
  // UI — renderiza o board uma vez
  // ═══════════════════════════════════════════════════════════

  function buildBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';

    Object.entries(CONFIG).forEach(([trackKey, track]) => {
      const col = document.createElement('div');
      col.className = `track ${trackKey}`;

      // cabeçalho da trilha
      const head = document.createElement('div');
      head.className = 'track-head';
      head.innerHTML = `
        <div class="eyebrow">trilha ${String(Object.keys(CONFIG).indexOf(trackKey) + 1).padStart(2, '0')}</div>
        <h2>${track.name}</h2>
        <div class="motto">${track.motto}</div>
      `;
      col.appendChild(head);

      // geradores
      track.tiers.forEach((tier, idx) => {
        const gen = document.createElement('div');
        gen.className = 'gen';
        gen.dataset.tier = idx + 1;
        gen.dataset.track = trackKey;
        gen.dataset.idx = idx;

        const nameParts = tier.name.split(/(\w+)/);
        gen.innerHTML = `
          <div class="gen-top">
            <div class="gen-icon">${tier.icon}</div>
            <div>
              <div class="gen-name"><em>${tier.name}</em></div>
              <div class="gen-species">${tier.species}</div>
            </div>
            <div>
              <div class="gen-count" id="count-${trackKey}-${idx}">0</div>
              <div class="gen-count-label">possuídos</div>
            </div>
          </div>
          <div class="gen-stats">
            <div>
              <div class="stat-label">${idx === 0 ? 'produz' : 'gera'}</div>
              <div class="stat-value" id="produce-${trackKey}-${idx}">
                ${tier.baseProduction}/s · ${idx === 0 ? track.name.toLowerCase() : `${track.tiers[idx-1].name.toLowerCase()}s`}
              </div>
            </div>
            <div>
              <div class="stat-label">tier</div>
              <div class="stat-value">${['I','II','III','IV'][idx]}</div>
            </div>
          </div>
          <button class="buy-btn" id="buy-${trackKey}-${idx}" data-track="${trackKey}" data-idx="${idx}">
            <span class="buy-action">contratar um <em>${tier.name.toLowerCase()}</em></span>
            <span class="buy-cost" id="cost-${trackKey}-${idx}">${tier.baseCost}</span>
          </button>
          ${idx > 0 ? `<div class="gen-locked-overlay">desbloqueia após comprar 1 ${track.tiers[idx-1].name.toLowerCase()}</div>` : ''}
        `;
        col.appendChild(gen);
      });

      board.appendChild(col);
    });

    // attach listeners
    document.querySelectorAll('.buy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        buy(btn.dataset.track, parseInt(btn.dataset.idx));
      });
    });
  }

  // ═══════════════════════════════════════════════════════════
  // ECONOMY
  // ═══════════════════════════════════════════════════════════

  function costOf(trackKey, tierIdx) {
    const tier = CONFIG[trackKey].tiers[tierIdx];
    const owned = STATE.generators[trackKey][tierIdx];
    return Math.ceil(tier.baseCost * Math.pow(tier.costGrowth, owned));
  }

  // todos os geradores de tier > 0 custam o recurso da trilha.
  // tier 0 também custa o próprio recurso (começamos com 10 grátis)
  function costResourceOf(trackKey) {
    return trackKey; // simplificação v0.1: cada trilha custa seu próprio recurso
  }

  function buy(trackKey, tierIdx) {
    const cost = costOf(trackKey, tierIdx);
    const resKey = costResourceOf(trackKey);

    // checa desbloqueio
    if (tierIdx > 0 && STATE.generators[trackKey][tierIdx - 1] < 1) return;

    if (STATE.resources[resKey] < cost) return;

    STATE.resources[resKey] -= cost;
    STATE.generators[trackKey][tierIdx] += 1;
    STATE.totalActions += 1;

    // checa milestones de desbloqueio
    if (tierIdx < 3 && STATE.generators[trackKey][tierIdx] === 1 && STATE.generators[trackKey][tierIdx + 1] === 0) {
      const nextTier = CONFIG[trackKey].tiers[tierIdx + 1];
      showToast(`${nextTier.name} desbloqueado em ${CONFIG[trackKey].name}`);
      addLog(`<span class="acc ${trackKey === 'seeds' ? 'moss' : trackKey === 'strokes' ? 'pool' : ''}">${nextTier.name}</span> desbloqueado`);
    }

    // check primeiro nível de cada trilha (milestone)
    const msKey = `first-${trackKey}`;
    if (tierIdx === 0 && STATE.generators[trackKey][0] === 1 && !STATE.milestones.has(msKey)) {
      STATE.milestones.add(msKey);
    }

    // log da compra
    const trackNames = { letters: '', seeds: 'moss', strokes: 'pool' };
    addLog(`contratou <span class="acc ${trackNames[trackKey]}">${CONFIG[trackKey].tiers[tierIdx].name.toLowerCase()}</span>`);

    renderCounts();
    renderResources();

    // pulse na carta
    const card = document.querySelector(`.gen[data-track="${trackKey}"][data-idx="${tierIdx}"]`);
    if (card) {
      card.classList.remove('pulse');
      void card.offsetWidth;
      card.classList.add('pulse');
    }
  }

  // ═══════════════════════════════════════════════════════════
  // TICK — o coração do jogo
  // ═══════════════════════════════════════════════════════════

  function productionPerSecond(trackKey, tierIdx) {
    const tier = CONFIG[trackKey].tiers[tierIdx];
    return STATE.generators[trackKey][tierIdx] * tier.baseProduction;
  }

  function tick(dtSeconds) {
    Object.keys(CONFIG).forEach(trackKey => {
      const track = CONFIG[trackKey];

      // tier 4 → tier 3, tier 3 → tier 2, tier 2 → tier 1, tier 1 → recurso
      // faz de cima pra baixo pra cascata
      for (let i = track.tiers.length - 1; i >= 0; i--) {
        const produced = productionPerSecond(trackKey, i) * dtSeconds;
        if (produced <= 0) continue;

        if (i === 0) {
          STATE.resources[trackKey] += produced;
        } else {
          STATE.generators[trackKey][i - 1] += produced;
        }
      }
    });
  }

  // ═══════════════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════════════

  function formatNum(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
    if (n >= 1e9)  return (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6)  return (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e4)  return (n / 1e3).toFixed(2) + 'k';
    if (n >= 100)  return Math.floor(n).toString();
    if (n >= 10)   return n.toFixed(1);
    return n.toFixed(2);
  }

  function formatInt(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(2) + 'T';
    if (n >= 1e9)  return (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6)  return (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e4)  return (n / 1e3).toFixed(2) + 'k';
    return Math.floor(n).toString();
  }

  function renderResources() {
    document.getElementById('val-letters').textContent = formatNum(STATE.resources.letters);
    document.getElementById('val-seeds').textContent = formatNum(STATE.resources.seeds);
    document.getElementById('val-strokes').textContent = formatNum(STATE.resources.strokes);

    // taxa por segundo = produção do tier 1
    document.getElementById('rate-letters').textContent = formatNum(productionPerSecond('letters', 0));
    document.getElementById('rate-seeds').textContent = formatNum(productionPerSecond('seeds', 0));
    document.getElementById('rate-strokes').textContent = formatNum(productionPerSecond('strokes', 0));

    // total de ações
    document.getElementById('grandTotal').textContent = formatInt(STATE.totalActions);
  }

  function renderCounts() {
    Object.entries(CONFIG).forEach(([trackKey, track]) => {
      track.tiers.forEach((tier, idx) => {
        const count = STATE.generators[trackKey][idx];
        document.getElementById(`count-${trackKey}-${idx}`).textContent = formatInt(Math.floor(count));

        // atualiza produção
        const rate = productionPerSecond(trackKey, idx);
        const unit = idx === 0 ? track.name.toLowerCase() : `${track.tiers[idx-1].namePlural.toLowerCase()}`;
        document.getElementById(`produce-${trackKey}-${idx}`).textContent =
          `${formatNum(rate)}/s · ${unit}`;

        // custo
        const cost = costOf(trackKey, idx);
        document.getElementById(`cost-${trackKey}-${idx}`).textContent = formatNum(cost);

        // unlock & affordability
        const card = document.querySelector(`.gen[data-track="${trackKey}"][data-idx="${idx}"]`);
        const btn = document.getElementById(`buy-${trackKey}-${idx}`);
        const locked = idx > 0 && Math.floor(STATE.generators[trackKey][idx-1]) < 1;
        card.classList.toggle('locked', locked);

        const canAfford = STATE.resources[trackKey] >= cost;
        btn.disabled = !canAfford || locked;
      });
    });
  }

  // ═══════════════════════════════════════════════════════════
  // LOG (diário)
  // ═══════════════════════════════════════════════════════════

  const MAX_LOG = 4;
  const logFeed = document.getElementById('logFeed');

  function addLog(html) {
    const item = document.createElement('span');
    item.className = 'log-item';
    item.innerHTML = html;
    logFeed.prepend(item);
    while (logFeed.children.length > MAX_LOG) {
      logFeed.removeChild(logFeed.lastChild);
    }
  }

  // ═══════════════════════════════════════════════════════════
  // TOAST (milestones)
  // ═══════════════════════════════════════════════════════════

  const toast = document.getElementById('toast');
  let toastTimer = null;
  function showToast(text) {
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // ═══════════════════════════════════════════════════════════
  // BOOT
  // ═══════════════════════════════════════════════════════════

  buildBoard();
  renderResources();
  renderCounts();

  addLog(`república <span class="acc">fundada</span>`);
  addLog(`10 <span class="acc">letras</span>, 10 <span class="acc moss">sementes</span>, 10 <span class="acc pool">braçadas</span> de dote inicial`);

  let lastTick = performance.now();

  // FPS counter — média móvel das últimas N frames pra suavizar
  const fpsEl = document.getElementById('fpsCounter');
  let fpsFrames = 0;
  let fpsLast = performance.now();

  function loop(now) {
    const dt = (now - lastTick) / 1000;
    lastTick = now;
    tick(dt);

    // render com throttle leve
    renderResources();
    renderCounts();

    // FPS — atualiza a cada 0.5s pra não ficar piscando
    fpsFrames++;
    const elapsed = now - fpsLast;
    if (elapsed >= 500) {
      const fps = Math.round((fpsFrames * 1000) / elapsed);
      if (fpsEl) fpsEl.textContent = fps + ' fps';
      fpsFrames = 0;
      fpsLast = now;
    }

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // botões de utilidade
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('Reiniciar a república? Todo o progresso será perdido.')) return;
    STATE.resources = { letters: 10, seeds: 10, strokes: 10 };
    STATE.generators = { letters: [0,0,0,0], seeds: [0,0,0,0], strokes: [0,0,0,0] };
    STATE.milestones = new Set();
    STATE.totalActions = 0;
    addLog(`república <span class="acc">refundada</span>`);
    renderResources();
    renderCounts();
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    showToast('Salvamento virá na próxima versão');
  });

  // theme toggle — sol vira lua e vice-versa
  document.getElementById('themeBtn').addEventListener('click', () => {
    const root = document.documentElement;
    const next = root.dataset.theme === 'dark' ? 'light' : 'dark';
    root.dataset.theme = next;
    showToast(next === 'dark' ? 'Noite estendida sobre a república' : 'Dia claro sobre a república');
  });

</script>
</body>
</html>
